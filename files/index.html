<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAHiD — Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }

  /* ─── VIDEO BACKGROUND ─────────────────────────────────── */
  .video-wrapper {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.38);
    z-index: 1;
  }

  /* ─── PAGE SHELL ────────────────────────────────────────── */
  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── GLASS BASE ────────────────────────────────────────── */
  .glass-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 22px;
    height: 44px;
    border-radius: 999px;
    color: rgba(255,255,255,0.92);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    outline: none;
    white-space: nowrap;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);

    box-shadow:
      0 8px 30px rgba(0,0,0,0.15),
      inset 0 1px 1px rgba(255,255,255,0.6),
      inset 0 -1px 1px rgba(255,255,255,0.1);

    transition:
      transform 0.3s ease,
      background 0.3s ease,
      box-shadow 0.3s ease;

    /* entry animation */
    opacity: 0;
    transform: translateY(15px);
  }

  /* glossy inner reflection */
  .glass-button::before {
    content: "";
    position: absolute;
    top: 0;
    left: 5%;
    width: 90%;
    height: 35%;
    border-radius: inherit;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.35) 0%,
      rgba(255,255,255,0.12) 35%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* cursor-following light sheen */
  .glass-button::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(
      circle 60px at var(--mx, 50%) var(--my, 50%),
      rgba(255,255,255,0.07) 0%,
      transparent 70%
    );
    pointer-events: none;
    transition: background 0.1s ease;
  }

  .glass-button:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.13);
    box-shadow:
      0 12px 40px rgba(0,0,0,0.22),
      inset 0 1px 2px rgba(255,255,255,0.7),
      inset 0 -1px 1px rgba(255,255,255,0.12);
  }

  /* ─── SIGN UP — primary glass pill ─────────────────────── */
  .glass-button--primary {
    height: 48px;
    padding: 0 28px;
    font-size: 14px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.32);
    box-shadow:
      0 10px 40px rgba(0,0,0,0.22),
      0 2px 8px rgba(0,0,0,0.1),
      inset 0 1.5px 1px rgba(255,255,255,0.75),
      inset 0 -1px 1px rgba(255,255,255,0.15);
    color: #fff;
  }
  .glass-button--primary::before {
    height: 40%;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 40%,
      transparent 100%
    );
  }
  .glass-button--primary:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.2);
    box-shadow:
      0 16px 50px rgba(0,0,0,0.28),
      inset 0 2px 2px rgba(255,255,255,0.8),
      inset 0 -1px 1px rgba(255,255,255,0.15);
  }

  /* ─── SERVICE CHIP — slightly smaller ───────────────────── */
  .glass-chip {
    height: 40px;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 500;
  }
  .glass-chip:hover {
    transform: translateY(-3px) scale(1.03);
    background: rgba(255,255,255,0.14);
  }
  .glass-chip.selected {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.5);
    color: #fff;
    box-shadow:
      0 8px 30px rgba(0,0,0,0.18),
      inset 0 1px 2px rgba(255,255,255,0.8),
      inset 0 -1px 1px rgba(255,255,255,0.2);
  }

  /* ─── LOG IN — ghost, no background ────────────────────── */
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }
  .btn-ghost::before { display: none; }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
    color: #fff;
    box-shadow: none;
    transform: none;
  }

  /* ─── NAVBAR ────────────────────────────────────────────── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    padding: 0 48px;
    height: 72px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav-left {
    display: flex;
    align-items: center;
  }
  .nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  /* ─── HERO ──────────────────────────────────────────────── */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: stretch;
  }
  .hero-left {
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .hero-headline {
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    line-height: 1.08;
    letter-spacing: -2px;
    margin-bottom: 22px;
    opacity: 0;
    transform: translateY(15px);
  }
  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    line-height: 1.75;
    max-width: 380px;
    margin-bottom: 52px;
    font-weight: 400;
    opacity: 0;
    transform: translateY(15px);
  }
  .divider {
    width: 36px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin-bottom: 32px;
    opacity: 0;
  }
  .service-label {
    font-size: 19px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    opacity: 0;
    transform: translateY(10px);
  }
  .service-hint {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(10px);
  }
  .service-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hero-right { /* empty for now */ }

  /* ─── STAGGERED ENTRY ANIMATIONS ────────────────────────── */
  .animate { animation: fadeUp 0.6s ease-out forwards; }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

  <div class="video-wrapper">
    <video muted playsinline preload="auto">
      <source src="video_web.mp4" type="video/mp4">
    </video>
  </div>
  <div class="overlay"></div>

  <div class="page">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="#" class="nav-logo">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
            <path d="M9 0 L10.2 7.8 L18 9 L10.2 10.2 L9 18 L7.8 10.2 L0 9 L7.8 7.8 Z" fill="white"/>
          </svg>
          <span style="font-size:15px;font-weight:700;letter-spacing:1px;color:#fff;">ZAH<span style="font-weight:400;letter-spacing:1px;">i</span>D</span>
        </a>
      </div>

      <div class="nav-center">
        <a href="#" class="glass-button">Freelancer</a>
        <a href="#" class="glass-button">Agency</a>
        <a href="#" class="glass-button">Pricing</a>
        <a href="#" class="glass-button">Blog</a>
        <a href="#" class="glass-button">Guides</a>
      </div>

      <div class="nav-right">
        <button class="glass-button btn-ghost">Log in</button>
        <button class="glass-button glass-button--primary">Sign up for free</button>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-left">
        <h1 class="hero-headline">We'd love to<br>hear from you!</h1>
        <p class="hero-sub">Whether you have questions, feedback, or just want to connect, drop us a message and we'll get back to you as soon as possible.</p>

        <div class="divider"></div>

        <p class="service-label">What sort of service?</p>
        <p class="service-hint">Select all that apply</p>

        <div class="service-chips">
          <button class="glass-button glass-chip" onclick="this.classList.toggle('selected')">Brand</button>
          <button class="glass-button glass-chip" onclick="this.classList.toggle('selected')">Digital</button>
          <button class="glass-button glass-chip" onclick="this.classList.toggle('selected')">Campaign</button>
          <button class="glass-button glass-chip" onclick="this.classList.toggle('selected')">Other</button>
        </div>
      </div>
      <div class="hero-right"></div>
    </div>

  </div>

<script>
(function () {

  /* ── VIDEO SCRUB ─────────────────────────────────────────── */
  var video = document.querySelector('video');
  var prevX = null, targetTime = 0, seeking = false;
  var SENSITIVITY = 0.8;

  video.addEventListener('loadedmetadata', function () {
    targetTime = 0; video.currentTime = 0;
  });
  video.addEventListener('seeked', function () {
    seeking = false;
    if (Math.abs(video.currentTime - targetTime) > 0.001) {
      seeking = true; video.currentTime = targetTime;
    }
  });
  window.addEventListener('mousemove', function (e) {
    if (prevX === null) { prevX = e.clientX; return; }
    var delta = e.clientX - prevX; prevX = e.clientX;
    if (!video.duration) return;
    targetTime = Math.max(0, Math.min(video.duration,
      targetTime + (delta / window.innerWidth) * SENSITIVITY * video.duration
    ));
    if (!seeking) { seeking = true; video.currentTime = targetTime; }
  });
  window.addEventListener('mouseleave', function () { prevX = null; });

  /* ── CURSOR-FOLLOWING SHEEN ON GLASS BUTTONS ─────────────── */
  document.querySelectorAll('.glass-button').forEach(function (btn) {
    btn.addEventListener('mousemove', function (e) {
      var r = btn.getBoundingClientRect();
      var x = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
      var y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
      btn.style.setProperty('--mx', x);
      btn.style.setProperty('--my', y);
    });
  });

  /* ── STAGGERED ENTRY ANIMATIONS ──────────────────────────── */
  var items = [
    // nav pills
    ...document.querySelectorAll('.nav-center .glass-button'),
    document.querySelector('.btn-ghost'),
    document.querySelector('.glass-button--primary'),
    // hero text
    document.querySelector('.hero-headline'),
    document.querySelector('.hero-sub'),
    document.querySelector('.divider'),
    document.querySelector('.service-label'),
    document.querySelector('.service-hint'),
    // chips
    ...document.querySelectorAll('.glass-chip'),
  ];

  items.forEach(function (el, i) {
    if (!el) return;
    setTimeout(function () {
      el.classList.add('animate');
    }, 80 + i * 55);
  });

})();
</script>
</body>
</html>
