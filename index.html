<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAHiD — Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }

  /* VIDEO BACKGROUND */
  .video-wrapper {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* OVERLAY — subtle dark veil so text pops */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 1;
  }

  /* MAIN LAYOUT */
  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    padding: 0 48px;
    height: 62px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
    text-decoration: none;
  }
  .logo-icon {
    width: 26px; height: 26px;
    background: #fff;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }
  .nav-links a {
    font-size: 13.5px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: #fff; }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn-login {
    font-size: 13.5px;
    color: rgba(255,255,255,0.8);
    background: none;
    border: none;
    cursor: pointer;
    padding: 7px 12px;
    font-family: inherit;
    transition: color 0.15s;
  }
  .btn-login:hover { color: #fff; }
  .btn-signup {
    font-size: 13.5px;
    color: #111;
    background: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .btn-signup:hover { background: #eee; }

  /* HERO CONTENT */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: stretch;
  }

  .hero-left {
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-headline {
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    line-height: 1.08;
    letter-spacing: -2px;
    margin-bottom: 22px;
  }

  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    line-height: 1.75;
    max-width: 380px;
    margin-bottom: 56px;
    font-weight: 400;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    margin-bottom: 36px;
  }

  .service-label {
    font-size: 19px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .service-hint {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 22px;
  }

  .service-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chip {
    font-size: 13.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 10px 24px;
    cursor: pointer;
    font-family: inherit;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .chip:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
    color: #fff;
  }
  .chip.selected {
    background: #fff;
    border-color: #fff;
    color: #111;
  }

  /* RIGHT side stays empty for now */
  .hero-right {
    /* intentionally empty */
  }
</style>
</head>
<body>

  <!-- VIDEO BACKGROUND -->
  <div class="video-wrapper">
    <video muted playsinline preload="auto">
      <source src="video_web.mp4" type="video/mp4">
    </video>
  </div>

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- PAGE CONTENT -->
  <div class="page">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="#" class="nav-logo">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
            <path d="M9 0 L10.2 7.8 L18 9 L10.2 10.2 L9 18 L7.8 10.2 L0 9 L7.8 7.8 Z" fill="white"/>
          </svg>
          <span style="font-size:15px;font-weight:700;letter-spacing:1px;color:#fff;">ZAH<span style="font-weight:400;letter-spacing:1px;">i</span>D</span>
        </a>
      </div>
      <div class="nav-center">
        <ul class="nav-links">
          <li><a href="#">Freelancer</a></li>
          <li><a href="#">Agency</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Guides</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <button class="btn-login">Log in</button>
        <button class="btn-signup">Sign up for free</button>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-left">
        <h1 class="hero-headline">We'd love to<br>hear from you!</h1>
        <p class="hero-sub">Whether you have questions, feedback, or just want to connect, drop us a message and we'll get back to you as soon as possible.</p>

        <div class="divider"></div>

        <p class="service-label">What sort of service?</p>
        <p class="service-hint">Select all that apply</p>

        <div class="service-chips">
          <button class="chip" onclick="this.classList.toggle('selected')">Brand</button>
          <button class="chip" onclick="this.classList.toggle('selected')">Digital</button>
          <button class="chip" onclick="this.classList.toggle('selected')">Campaign</button>
          <button class="chip" onclick="this.classList.toggle('selected')">Other</button>
        </div>
      </div>

      <div class="hero-right"></div>
    </div>

  </div>

<script>
  (function () {
    var video = document.querySelector('video');
    var prevX = null;
    var targetTime = 0;
    var seeking = false;
    var SENSITIVITY = 0.8;

    // Wait for metadata so duration is available
    video.addEventListener('loadedmetadata', function () {
      targetTime = 0;
      video.currentTime = 0;
    });

    // onseeked: flush any pending targetTime
    video.addEventListener('seeked', function () {
      seeking = false;
      if (Math.abs(video.currentTime - targetTime) > 0.001) {
        seeking = true;
        video.currentTime = targetTime;
      }
    });

    window.addEventListener('mousemove', function (e) {
      if (prevX === null) { prevX = e.clientX; return; }

      var delta = e.clientX - prevX;
      prevX = e.clientX;

      if (!video.duration) return;

      var offset = (delta / window.innerWidth) * SENSITIVITY * video.duration;
      targetTime = Math.max(0, Math.min(video.duration, targetTime + offset));

      if (!seeking) {
        seeking = true;
        video.currentTime = targetTime;
      }
    });

    window.addEventListener('mouseleave', function () { prevX = null; });
  })();
</script>
</body>
</html>
